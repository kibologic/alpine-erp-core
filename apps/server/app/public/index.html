<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpine ERP</title>
  <script>
    (function() {
      var saved = localStorage.getItem('alpine-theme') || 'dark';
      var theme;
      if (saved === 'system') {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      } else {
        theme = saved;
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/shell.css">
  <link rel="stylesheet" href="/styles/auth.css">
  <link rel="stylesheet" href="/styles/auth-pages.css">
  <link rel="stylesheet" href="/styles/pos.css">
  <link rel="stylesheet" href="/styles/finance.css">
  <link rel="stylesheet" href="/styles/hr.css">
  <link rel="stylesheet" href="/styles/inventory.css">
  <link rel="stylesheet" href="/styles/sales.css">
  <link rel="stylesheet" href="/styles/procurement.css">
  <link rel="stylesheet" href="/styles/modules-shared.css">
  <link rel="stylesheet" href="/styles/components.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/index.ui"></script>
</body>
</html>
