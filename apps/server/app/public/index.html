<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpine ERP</title>
  <script>
    (function() {
      var saved = localStorage.getItem('alpine-theme') || 'dark';
      var theme;
      if (saved === 'system') {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      } else {
        theme = saved;
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/node_modules/@skltn/shell/design-tokens/primitive.css">
  <link rel="stylesheet" href="/node_modules/@skltn/shell/design-tokens/semantic.css">
  <link rel="stylesheet" href="/node_modules/@skltn/shell/design-tokens/component.css">
  <link rel="stylesheet" href="/node_modules/@skltn/shell/host/src/shell.css">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/shell.css">
  <link rel="stylesheet" href="/styles/auth.css">
  <link rel="stylesheet" href="/styles/auth-pages.css">
  <link rel="stylesheet" href="/styles/pos.css">
  <link rel="stylesheet" href="/styles/inventory.css">
  <link rel="stylesheet" href="/styles/modules-shared.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/node_modules/@alpine/ui/src/styles/alpine-ui.css">
  <script type="importmap">
    {
      "imports": {
        "@alpine/ui": "/node_modules/@alpine/ui/src/index.ui",
        "@skltn/shell": "/node_modules/@skltn/shell/host/src/index.ui",
        "@skltn/contracts":    "/node_modules/@skltn/shell/packages/contracts/index.js",
        "@skltn/event-bus":    "/node_modules/@skltn/shell/packages/event-bus/index.js",
        "@skltn/logging":      "/node_modules/@skltn/shell/packages/logging/index.js",
        "@skltn/storage":      "/node_modules/@skltn/shell/packages/storage/index.js",
        "@skltn/device":       "/node_modules/@skltn/shell/packages/device/index.js",
        "@skltn/connectivity": "/node_modules/@skltn/shell/packages/connectivity/index.js",
        "@skltn/auth":         "/node_modules/@skltn/shell/packages/auth/index.js",

        "@skltn/heartbeat":    "/node_modules/@skltn/shell/packages/heartbeat/index.js",
        "@skltn/cache":        "/node_modules/@skltn/shell/packages/cache/index.js",
        "@skltn/tenant":       "/node_modules/@skltn/shell/packages/tenant/index.js",
        "@skltn/permissions":  "/node_modules/@skltn/shell/packages/permissions/index.js",
